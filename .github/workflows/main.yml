name: Build
on:
  pull_request:
  push:
    branches:
      - main
  # A weekly run rebuilds and re-runs e2e with no code change, catching bit-rot
  # and external regressions (a dhtproxy endpoint going away). workflow_dispatch
  # allows the same on demand.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  GO_VERSION: "stable"
  APP: "stunmesh"

jobs:
  codegen:
    name: Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - run: go install github.com/google/wire/cmd/wire@latest
      - run: wire .
      - name: git diff
        run: |
          git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'wire .' command and commit."; exit 1)

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, freebsd]
    steps:
      - uses: actions/checkout@v7
      - name: Lint
        uses: ./.github/actions/lint
        with:
          go-version: ${{ env.GO_VERSION }}
          goos: ${{ matrix.goos }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Test
        uses: ./.github/actions/test
        with:
          go-version: ${{ env.GO_VERSION }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    strategy:
      matrix:
        os: [linux, darwin, freebsd]
        arch: [amd64, arm64, arm, mipsle]
        variant: [normal, extra-min]
        exclude:
          - os: darwin
            arch: arm
          - os: darwin
            arch: mipsle
          - os: darwin
            variant: extra-min
          - os: freebsd
            arch: arm
          - os: freebsd
            arch: mipsle
          - os: freebsd
            variant: extra-min
    steps:
      - uses: actions/checkout@v7
      - name: Build
        uses: ./.github/actions/build
        id: build
        with:
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          app-name: ${{ env.APP }}
          go-version: ${{ env.GO_VERSION }}
          variant: ${{ matrix.variant }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.binary-name }}
          path: ${{ steps.build.outputs.binary-name }}

  # The only job running on real FreeBSD. It covers the two things the
  # cross-compiled matrix cannot: the wgcli tests on the platform where wgcli is
  # the default, and a compile check of wgctrl, which needs CGO and so cannot be
  # cross-compiled. amd64 only — arm64 runs emulated and is far too slow.
  freebsd:
    name: FreeBSD (test + wgctrl build)
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - uses: actions/checkout@v7
      - name: Test and build
        uses: vmactions/freebsd-vm@v1
        with:
          arch: amd64
          sync: sshfs
          prepare: |
            pkg update -f
            pkg install -y gmake go
          run: |
            cd $GITHUB_WORKSPACE
            gmake test
            gmake build BACKEND=wgctrl

  build-plugins:
    name: Build Plugins
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    strategy:
      matrix:
        os: [linux, darwin, freebsd]
        arch: [amd64, arm64, arm, mipsle]
        exclude:
          - os: darwin
            arch: arm
          - os: darwin
            arch: mipsle
          - os: freebsd
            arch: arm
          - os: freebsd
            arch: mipsle
    steps:
      - uses: actions/checkout@v7
      - name: Build All Plugins
        uses: ./.github/actions/build-all-plugins
        id: build-plugins
        with:
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build-plugins.outputs.artifact-name }}
          path: plugins_dist/*
          if-no-files-found: warn

  docker:
    # Publish only on a real merge to main -- not on PRs, and not on the weekly
    # schedule or a manual dispatch, which should build and test but not push.
    if: github.event_name == 'push'
    name: Build Docker container
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - uses: actions/checkout@v7
      - name: Build and Push Docker
        uses: ./.github/actions/docker
        with:
          app-name: ${{ env.APP }}
          docker-token: ${{ secrets.DOCKER_TOKEN }}
          repository-owner: ${{ github.repository_owner }}

  # Runtime test of the real publish -> opendht -> establish pipeline with two
  # live WireGuard interfaces, running the exact binary the build stage produced.
  # It depends on the public dhtproxy endpoints and outbound STUN, so it is not a
  # required check; failures are advisory. The action branches per os; freebsd
  # runs in a VM on a Linux host (arm64 -> arm64 host for native virt). See
  # test/e2e/.
  e2e:
    name: E2E (${{ matrix.os }}/${{ matrix.arch }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: amd64, runner: ubuntu-24.04 }
          - { os: linux, arch: arm64, runner: ubuntu-24.04-arm }
          - { os: darwin, arch: arm64, runner: macos-15 }
          - { os: darwin, arch: amd64, runner: macos-15-intel }
          - { os: freebsd, arch: amd64, runner: ubuntu-latest }
          - { os: freebsd, arch: arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/e2e
        with:
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          app-name: ${{ env.APP }}
