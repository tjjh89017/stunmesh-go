name: Release
on:
  push:
    tags:
      - '*'

env:
  GO_VERSION: "stable"
  APP: "stunmesh"

jobs:
  # No lint/test: the tagged main commit already passed the full Build workflow.

  # Creates the draft up front so the upload jobs below only ever find it.
  # A draft is invisible to the get-release-by-tag API, so every uploader falls
  # back to listing releases; without this barrier the ones that start together
  # all miss it and each create their own draft for the same tag.
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: tag
        id: tag
        run: echo "TAG=$(git describe --tags --dirty)" >> "$GITHUB_OUTPUT"
      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: >-
            ${{
              contains(steps.tag.outputs.TAG, 'RC') ||
              contains(steps.tag.outputs.TAG, 'rc')
            }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - create-release
    permissions:
      contents: write
    strategy:
      matrix:
        os: [linux, darwin, freebsd]
        arch: [amd64, arm64, arm, mipsle]
        variant: [normal, extra-min]
        exclude:
          - os: darwin
            arch: arm
          - os: darwin
            arch: mipsle
          - os: darwin
            variant: extra-min
          - os: freebsd
            arch: arm
          - os: freebsd
            arch: mipsle
          - os: freebsd
            variant: extra-min
    steps:
      - uses: actions/checkout@v7
      - name: tag
        id: tag
        run: echo "TAG=$(git describe --tags --dirty)" >> "$GITHUB_OUTPUT"
      - name: Build
        uses: ./.github/actions/build
        id: build
        with:
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          app-name: ${{ env.APP }}
          go-version: ${{ env.GO_VERSION }}
          tag: ${{ steps.tag.outputs.TAG }}
          variant: ${{ matrix.variant }}
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.build.outputs.binary-name }}
          draft: true
          prerelease: >-
            ${{
              contains(steps.tag.outputs.TAG, 'RC') ||
              contains(steps.tag.outputs.TAG, 'rc')
            }}

  release-plugins:
    name: Release Plugins
    runs-on: ubuntu-latest
    needs:
      - create-release
    permissions:
      contents: write
    strategy:
      matrix:
        os: [linux, darwin, freebsd]
        arch: [amd64, arm64, arm, mipsle]
        exclude:
          - os: darwin
            arch: arm
          - os: darwin
            arch: mipsle
          - os: freebsd
            arch: arm
          - os: freebsd
            arch: mipsle
    steps:
      - uses: actions/checkout@v7
      - name: tag
        id: tag
        run: echo "TAG=$(git describe --tags --dirty)" >> "$GITHUB_OUTPUT"
      - name: Build All Plugins
        uses: ./.github/actions/build-all-plugins
        with:
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          go-version: ${{ env.GO_VERSION }}
      - name: Archive Plugins
        uses: ./.github/actions/archive-plugins
        id: archive
        with:
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          source-dir: plugins_dist
          tag: ${{ steps.tag.outputs.TAG }}
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.archive.outputs.zip-file }}
            ${{ steps.archive.outputs.tar-file }}
          draft: true
          prerelease: >-
            ${{
              contains(steps.tag.outputs.TAG, 'RC') ||
              contains(steps.tag.outputs.TAG, 'rc')
            }}

  docker:
    name: Build Docker container
    runs-on: ubuntu-latest
    needs:
      - create-release
    steps:
      - uses: actions/checkout@v7
      - name: Build and Push Docker
        uses: ./.github/actions/docker
        with:
          app-name: ${{ env.APP }}
          docker-token: ${{ secrets.DOCKER_TOKEN }}
          repository-owner: ${{ github.repository_owner }}
