name: E2E

# Exercises the real publish -> opendht -> establish pipeline on every OS with
# two live WireGuard interfaces. It depends on the public dhtproxy endpoints and
# outbound STUN, so its failures are advisory (not a required check), but every
# change reaching main runs it.
on:
  # Every change reaching main goes through a PR, so gate all of them -- no
  # path filter, a doc-only change still merges to main and should be covered.
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

env:
  GO_VERSION: "stable"

jobs:
  linux:
    name: E2E (linux/${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-24.04 }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y wireguard-tools jq
      - name: Build
        run: make build BUILTIN=builtin_opendht APP=stunmesh
      - name: Run e2e
        run: sh test/e2e/run.sh ./stunmesh

  macos:
    name: E2E (macos/${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: arm64, runner: macos-15 }
          - { arch: amd64, runner: macos-15-intel }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install tools
        run: brew install wireguard-tools wireguard-go jq
      - name: Build
        run: make build BUILTIN=builtin_opendht APP=stunmesh
      - name: Run e2e
        run: sh test/e2e/run.sh ./stunmesh

  freebsd:
    name: E2E (freebsd/${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # aarch64 needs an arm64 host so the guest is virtualized natively;
          # emulating it on an amd64 host is far too slow.
          - { arch: amd64, host: ubuntu-latest }
          - { arch: aarch64, host: ubuntu-24.04-arm }
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v7
      - name: Run e2e in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          arch: ${{ matrix.arch }}
          sync: sshfs
          prepare: |
            pkg update -f
            pkg install -y gmake go wireguard-tools jq curl
            kldload if_wg
          run: |
            cd $GITHUB_WORKSPACE
            gmake build BUILTIN=builtin_opendht APP=stunmesh
            sh test/e2e/run.sh ./stunmesh
