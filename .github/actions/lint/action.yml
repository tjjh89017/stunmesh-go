name: 'Lint Code'
description: 'Run golangci-lint on the codebase'

inputs:
  go-version:
    description: 'Go version to use'
    required: true
    default: 'stable'
  goos:
    description: 'GOOS to lint for; golangci-lint only sees the files its GOOS selects'
    required: false
    default: 'linux'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-go@v7
      with:
        go-version: ${{ inputs.go-version }}
        cache: false

    # Build tags come from .golangci.yaml, so a bare golangci-lint run locally
    # checks the same files this does.
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
      env:
        GOOS: ${{ inputs.goos }}
